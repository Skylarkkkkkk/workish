<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f7f5f0">
  <meta name="description" content="一个安静记录上班、坐着、站着和摸鱼时间的小工具。">
  <title>workish — 今天坐了多久</title>
  <style>
    :root{--paper:#f7f5f0;--ink:#151513;--muted:#858179;--line:#d8d3ca;--accent:#ff4b2e}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--paper);color:var(--ink)}
    body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Microsoft YaHei",sans-serif;-webkit-font-smoothing:antialiased}
    button,input,select{font:inherit}button{color:inherit}.app{position:relative;min-height:100vh;overflow:hidden;background:radial-gradient(circle at 50% 42%,rgba(255,255,255,.78),transparent 46%),var(--paper)}
    .topbar{position:absolute;z-index:5;inset:0 0 auto;display:flex;justify-content:space-between;align-items:center;padding:29px 31px}.brand{font-size:22px;font-weight:550;letter-spacing:-.7px}
    .text-button{appearance:none;border:0;border-bottom:2px solid currentColor;background:transparent;padding:0 1px 7px;cursor:pointer;transition:color .2s,transform .2s}.text-button:hover{color:var(--accent)}.text-button:active{transform:translateY(1px)}
    button:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--accent);outline-offset:4px}.top-record,.clock-out{font-size:20px}
    .stage{position:absolute;inset:50% auto auto 50%;width:min(760px,calc(100vw - 48px));transform:translate(-50%,-60%);text-align:center}.state{display:flex;align-items:center;justify-content:center;gap:30px;margin-bottom:52px;font-size:clamp(28px,2.35vw,38px);font-weight:450;letter-spacing:-.8px}.state.muted{color:var(--muted);gap:0}
    .dot{width:16px;height:16px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 6px rgba(255,75,46,.05)}.dot.stopped{background:#a19d95;box-shadow:none}
    .timer{font-family:"SF Mono",ui-monospace,Menlo,monospace;font-size:clamp(72px,8.5vw,124px);font-weight:400;line-height:.95;letter-spacing:-7px;font-variant-numeric:tabular-nums;white-space:nowrap}.idle{color:#d8d3ca}
    .controls{display:flex;justify-content:center;gap:176px;margin-top:93px}.control,.start,.adjust{font-size:26px;letter-spacing:-.5px}.control.active{color:var(--accent)}.start,.adjust{margin-top:90px}.clock-out{position:absolute;right:41px;bottom:42px}
    .backdrop{position:fixed;z-index:20;inset:0;background:rgba(34,31,27,.14);opacity:0;pointer-events:none;transition:opacity .35s}.backdrop.show{opacity:1;pointer-events:auto}
    .drawer{position:fixed;z-index:25;top:0;right:0;width:min(448px,100vw);height:100vh;padding:31px 34px 28px;overflow-y:auto;background:#fbfaf7;border-left:1px solid rgba(21,21,19,.12);box-shadow:-24px 0 80px rgba(45,41,36,.08);transform:translateX(101%);transition:transform .42s cubic-bezier(.22,1,.36,1)}.drawer.open{transform:translateX(0)}
    .drawer-head{display:flex;align-items:flex-start;justify-content:space-between}.kicker,.section-label{color:var(--muted);font-size:12px;letter-spacing:.16em}.drawer h1{margin:7px 0 0;font-size:32px;font-weight:520;letter-spacing:-1.2px}.close,.cancel{border:0;border-bottom:1px solid currentColor;padding:0 0 4px;background:none;color:var(--muted);cursor:pointer;font-size:14px}
    .period-tabs{display:flex;gap:22px;margin-top:29px;border-bottom:1px solid var(--line)}.period-tabs button{border:0;border-bottom:2px solid transparent;padding:0 0 9px;background:none;color:var(--muted);cursor:pointer;font-size:13px}.period-tabs button.active{border-color:var(--ink);color:var(--ink)}.period-nav{display:grid;grid-template-columns:30px 1fr 30px;align-items:center;margin-top:31px}.period-nav span{text-align:center;font-size:14px}.period-nav button{border:0;background:none;color:var(--muted);cursor:pointer;font-size:20px}.period-nav button:disabled{cursor:default;opacity:.25}
    .summary{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;padding:52px 0 27px;border-bottom:1px solid var(--line)}.summary span{display:block;margin-bottom:10px;color:var(--muted);font-size:13px}.summary strong{display:block;font-size:19px;font-weight:510;line-height:1.25}.work-window{display:flex;align-items:baseline;justify-content:space-between;gap:20px;padding-top:17px;color:var(--muted);font-size:13px}.work-window strong{color:var(--ink);font-family:"SF Mono",ui-monospace,Menlo,monospace;font-size:14px;font-weight:500;font-variant-numeric:tabular-nums}.break-note{padding-top:10px;color:var(--muted);font-size:13px}
    .period-summary{margin-top:27px;border-bottom:1px solid var(--line)}.period-stat{display:grid;grid-template-columns:1fr auto;align-items:end;padding:19px 0;border-top:1px solid var(--line)}.period-stat:first-child{border-top:0}.period-stat span{color:var(--muted);font-size:13px}.period-stat strong{display:block;margin-top:5px;font-size:26px;font-weight:510;letter-spacing:-.6px}.period-stat em{color:var(--muted);font-size:12px;font-style:normal}.period-days{padding:15px 0 4px;color:var(--muted);font-size:12px;text-align:right}
    .drawer-actions{display:grid;grid-template-columns:1.2fr 1fr;gap:9px;margin:32px 0 38px}.primary,.secondary,.save{min-height:45px;border:1px solid var(--ink);border-radius:0;background:var(--ink);color:var(--paper);cursor:pointer;font-size:14px}.secondary{background:transparent;color:var(--ink)}.primary:hover,.save:hover{background:var(--accent);border-color:var(--accent)}.secondary:hover{border-color:var(--accent);color:var(--accent)}
    .history{margin-top:10px}.history-row{display:grid;grid-template-columns:1fr auto;width:100%;padding:16px 0;border:0;border-top:1px solid var(--line);background:transparent;cursor:pointer;text-align:left}.history-row span:last-child{color:var(--muted);font-size:13px}.history-row:hover span:first-child,.history-row.selected span:first-child{color:var(--accent)}.empty{padding:20px 0;border-top:1px solid var(--line);color:var(--muted);font-size:14px}
    .manual-list{margin-bottom:36px}.manual-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-top:1px solid var(--line)}.manual-row strong{display:block;font-size:14px;font-weight:520}.manual-row span{display:block;margin-top:4px;color:var(--muted);font-size:12px}.manual-row button,.backup button{border:0;background:none;color:var(--muted);cursor:pointer;font-size:12px}.manual-row button:hover,.backup button:hover{color:var(--accent)}.backup{display:flex;gap:18px;padding-top:30px}.backup button{padding:0 0 3px;border-bottom:1px solid currentColor}
    dialog{width:min(520px,calc(100% - 48px));max-height:calc(100vh - 48px);padding:32px 40px 34px;border:1px solid rgba(21,21,19,.14);border-radius:0;background:#fbfaf7;color:var(--ink);box-shadow:0 30px 100px rgba(35,31,27,.16)}dialog::backdrop{background:rgba(25,23,20,.2);backdrop-filter:blur(8px)}dialog h2{margin:0 0 8px;font-size:28px;font-weight:520;letter-spacing:-.8px}dialog>p{margin:0 0 22px;color:var(--muted);font-size:14px}.dialog-head{display:flex;justify-content:space-between;align-items:flex-start}.dialog-head .cancel{margin-left:20px}
    dialog label{position:relative;display:block;margin:13px 0;color:var(--muted);font-size:12px}dialog input:not([type=checkbox]),dialog select{display:block;width:100%;margin-top:7px;padding:9px 0;border:0;border-bottom:1px solid var(--ink);border-radius:0;background:transparent;color:var(--ink);font-size:17px;outline:none}.triple{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}.double{display:grid;grid-template-columns:repeat(2,1fr);gap:0 28px}.calculated{margin:-2px 0 3px;color:var(--muted);font-size:12px}dialog small{position:absolute;right:0;bottom:12px;color:var(--muted)}dialog .check{display:flex;align-items:center;gap:9px;color:var(--ink);font-size:14px}.check input{accent-color:var(--accent)}.save{width:100%;margin-top:14px}
    .toast{position:fixed;z-index:60;left:50%;bottom:36px;transform:translateX(-50%);padding:11px 18px;background:var(--ink);color:var(--paper);font-size:13px;box-shadow:0 10px 40px rgba(0,0,0,.14)}[hidden]{display:none!important}
    @media(max-width:700px){.topbar{padding:22px 20px}.brand{font-size:19px}.top-record,.clock-out{font-size:17px}.stage{transform:translate(-50%,-52%)}.state{gap:16px;margin-bottom:38px;font-size:24px}.dot{width:12px;height:12px}.timer{font-size:clamp(50px,18vw,76px);letter-spacing:-4px}.controls{gap:62px;margin-top:68px}.control,.start,.adjust{font-size:21px}.clock-out{right:22px;bottom:25px}.drawer{padding:25px 22px}.drawer-actions{grid-template-columns:1fr}dialog{padding:34px 24px 28px}.triple{gap:13px}}
    @media(prefers-reduced-motion:reduce){*,*:before,*:after{transition-duration:.01ms!important}}
  </style>
</head>
<body>
<main class="app">
  <header class="topbar"><div class="brand">workish</div><button id="recordsBtn" class="text-button top-record">记录</button></header>
  <section class="stage" aria-live="polite">
    <div id="state" class="state muted">今天还没开始</div>
    <div id="timer" class="timer idle">00:00:00</div>
    <div id="controls" class="controls" hidden><button id="postureBtn" class="text-button control">站起来</button><button id="activityBtn" class="text-button control">摸会鱼</button></div>
    <button id="startBtn" class="text-button start">开始上班</button>
    <button id="adjustBtn" class="text-button adjust" hidden>调整今天</button>
  </section>
  <button id="endBtn" class="text-button clock-out" hidden>下班</button>

  <div id="backdrop" class="backdrop"></div>
  <aside id="drawer" class="drawer" aria-hidden="true">
    <div class="drawer-head"><div><div class="kicker">记录</div><h1 id="drawerDate">今天</h1></div><button id="closeDrawer" class="close">关闭</button></div>
    <div id="periodTabs" class="period-tabs"><button class="active" data-view="day">日</button><button data-view="week">周</button><button data-view="month">月</button></div>
    <div id="dayView">
      <div class="summary"><div><span>坐着</span><strong id="sumSit">0 分钟</strong></div><div><span>站着</span><strong id="sumStand">0 分钟</strong></div><div><span>上班</span><strong id="sumWork">0 分钟</strong></div></div>
      <div id="workWindow" class="work-window" hidden><span>上班时间</span><strong id="workWindowValue">—</strong></div>
      <div id="sumBreak" class="break-note">其中摸鱼 0 分钟</div>
      <div class="drawer-actions"><button id="addEntry" class="primary">添加一段时间</button><button id="editTotals" class="secondary">调整当天</button></div>
      <div id="manualSection" class="manual-list" hidden><div class="section-label">补充记录</div><div id="manualRows"></div></div>
      <div class="history"><div class="section-label">过去</div><div id="historyRows"></div></div>
    </div>
    <div id="periodView" hidden>
      <div class="period-nav"><button id="periodPrev" aria-label="上一个周期">‹</button><span id="periodLabel"></span><button id="periodNext" aria-label="下一个周期">›</button></div>
      <div class="period-summary">
        <div class="period-stat"><div><span>上班</span><strong id="periodWork">0 分钟</strong></div><em id="periodWorkAvg">日均 0 分钟</em></div>
        <div class="period-stat"><div><span>通勤</span><strong id="periodCommute">0 分钟</strong></div><em id="periodCommuteAvg">日均 0 分钟</em></div>
        <div class="period-stat"><div><span>摸鱼</span><strong id="periodBreak">0 分钟</strong></div><em id="periodBreakAvg">日均 0 分钟</em></div>
      </div>
      <div id="periodDays" class="period-days">按 0 个记录日计算</div>
    </div>
    <div class="backup"><button id="exportBtn">导出备份</button><button id="importBtn">导入恢复</button><input id="importFile" type="file" accept="application/json" hidden></div>
  </aside>

  <dialog id="entryDialog">
    <div class="dialog-head"><div><h2>添加一段时间</h2><p>开会和通勤不用计时，之后补进来就好。</p></div><button class="cancel" data-close="entryDialog">取消</button></div>
    <label>哪一天<input id="entryDate" type="date"></label>
    <label>做了什么<select id="entryType"><option value="meeting">开会</option><option value="commute">通勤</option><option value="break">摸鱼</option><option value="meal">吃饭</option><option value="bathroom">上卫生间</option><option value="other">其他</option></select></label>
    <div id="entryTimeRange" class="double"><label>开始时间<input id="entryStartTime" type="time"></label><label>结束时间<input id="entryEndTime" type="time"></label></div>
    <div id="entryCalculated" class="calculated">自动算成 30 分钟</div>
    <label id="entryDurationField" hidden>通勤多久<input id="entryDuration" type="number" min="0" value="30"><small>分钟</small></label>
    <div class="double"><label>坐着<input id="entrySitting" type="number" min="0" value="30"><small>分钟</small></label><label>站着<input id="entryStanding" type="number" min="0" value="0"><small>分钟</small></label></div>
    <label class="check"><input id="entryWork" type="checkbox" checked>算进上班时间</label>
    <label>备注，可不填<input id="entryNote" type="text" placeholder="比如：周会"></label>
    <button id="saveEntry" class="save">加上</button>
  </dialog>

  <dialog id="totalsDialog">
    <div class="dialog-head"><div><h2>调整当天</h2><p>上班下班改具体时间，其他数字也可以补正。</p></div><button class="cancel" data-close="totalsDialog">取消</button></div>
    <div class="double"><label>上班时间<input id="workStartTime" type="time"></label><label>下班时间<input id="workEndTime" type="time"></label></div>
    <div id="workCalculated" class="calculated"></div>
    <div class="triple"><label>坐着<input id="totalSitting" type="number" min="0"><small>分钟</small></label><label>站着<input id="totalStanding" type="number" min="0"><small>分钟</small></label><label>摸鱼<input id="totalBreak" type="number" min="0"><small>分钟</small></label></div>
    <button id="saveTotals" class="save">就这样</button>
  </dialog>
  <div id="toast" class="toast" hidden></div>
</main>

<script>
  (()=>{
    const KEY='workish:v1';
    const typeNames={meeting:'开会',commute:'通勤',break:'摸鱼',meal:'吃饭',bathroom:'上卫生间',other:'其他'};
    let data={version:1,days:{}};let selected=dateKey();let viewMode='day';let periodAnchor=dateKey();let now=new Date();let toastTimer;
    try{const saved=localStorage.getItem(KEY);if(saved)data=JSON.parse(saved);navigator.storage&&navigator.storage.persist&&navigator.storage.persist()}catch(e){}
    const $=id=>document.getElementById(id);
    function dateKey(d=new Date()){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${day}`}
    function blank(date){return{date,workStart:null,workEnd:null,postureEvents:[],activityEvents:[],manualEntries:[]}}
    function day(date){return data.days[date]}
    function update(date,fn){data.days[date]=fn(data.days[date]||blank(date));persist();render()}
    function persist(){try{localStorage.setItem(KEY,JSON.stringify(data))}catch(e){toast('浏览器没有允许储存')}}
    function eventMinutes(start,end,events,wanted){const endMs=new Date(end).getTime();let total=0;events.forEach((e,i)=>{if(e.mode!==wanted)return;const from=Math.max(new Date(start).getTime(),new Date(e.at).getTime());const to=Math.min(endMs,i+1<events.length?new Date(events[i+1].at).getTime():endMs);if(to>from)total+=(to-from)/60000});return Math.max(0,Math.round(total))}
    function manualImpact(d,entries,end){let work=0,sitting=0,standing=0,breakTime=0;const workStartMs=d.workStart?new Date(d.workStart).getTime():NaN,workEndMs=new Date(end).getTime();entries.forEach(e=>{let entryWork=e.includeInWork?e.duration:0,entrySitting=e.sitting,entryStanding=e.standing,entryBreak=e.type==='break'?e.duration:0;if(e.startAt&&e.endAt&&Number.isFinite(workStartMs)){const overlapStart=Math.max(workStartMs,new Date(e.startAt).getTime()),overlapEnd=Math.min(workEndMs,new Date(e.endAt).getTime()),overlap=Math.max(0,Math.round((overlapEnd-overlapStart)/60000));if(overlap>0){const overlapStartAt=new Date(overlapStart).toISOString(),overlapEndAt=new Date(overlapEnd).toISOString(),overlappedStanding=eventMinutes(overlapStartAt,overlapEndAt,d.postureEvents,'stand'),overlappedBreak=eventMinutes(overlapStartAt,overlapEndAt,d.activityEvents,'break');if(e.includeInWork)entryWork=Math.max(0,entryWork-overlap);entrySitting-=Math.max(0,overlap-overlappedStanding);entryStanding-=overlappedStanding;entryBreak-=overlappedBreak}}work+=entryWork;sitting+=entrySitting;standing+=entryStanding;breakTime+=Math.max(0,entryBreak)});return{work,sitting,standing,break:breakTime}}
    function summary(d){
      if(!d)return{work:0,sitting:0,standing:0,break:0};
      const end=d.workEnd||now.toISOString(),entries=d.manualEntries||[],autoWork=d.workStart?Math.max(0,Math.round((new Date(end)-new Date(d.workStart))/60000)):0,autoStand=d.workStart?eventMinutes(d.workStart,end,d.postureEvents,'stand'):0,autoBreak=d.workStart?eventMinutes(d.workStart,end,d.activityEvents,'break'):0,impact=manualImpact(d,entries,end),calculated={work:Math.max(0,autoWork+impact.work),standing:Math.max(0,autoStand+impact.standing),sitting:Math.max(0,autoWork-autoStand+impact.sitting),break:autoBreak+impact.break};
      if(!d.overrides)return calculated;
      if(!d.overridesAt||!d.workStart)return d.overrides;
      const cutoffMs=new Date(d.overridesAt).getTime(),endMs=new Date(end).getTime();
      if(!Number.isFinite(cutoffMs)||!Number.isFinite(endMs))return d.overrides;
      const manualCutoffMs=d.manualOverridesAt?new Date(d.manualOverridesAt).getTime():cutoffMs,extraAutoWork=endMs>cutoffMs?Math.max(0,Math.round((endMs-cutoffMs)/60000)):0,extraAutoStand=endMs>cutoffMs?eventMinutes(d.overridesAt,end,d.postureEvents,'stand'):0,extraAutoBreak=endMs>cutoffMs?eventMinutes(d.overridesAt,end,d.activityEvents,'break'):0,laterEntries=entries.filter(e=>e.createdAt&&new Date(e.createdAt).getTime()>manualCutoffMs),extraImpact=manualImpact(d,laterEntries,end);
      return{work:Math.max(0,d.overrides.work+extraAutoWork+extraImpact.work),standing:Math.max(0,d.overrides.standing+extraAutoStand+extraImpact.standing),sitting:Math.max(0,d.overrides.sitting+Math.max(0,extraAutoWork-extraAutoStand)+extraImpact.sitting),break:d.overrides.break+extraAutoBreak+extraImpact.break}
    }
    function clock(seconds){const s=Math.max(0,Math.floor(seconds));return `${String(Math.floor(s/3600)).padStart(2,'0')}:${String(Math.floor((s%3600)/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`}
    function mins(n){const h=Math.floor(n/60),r=Math.max(0,Math.round(n%60));return h?(r?`${h} 小时 ${r} 分`:`${h} 小时`):`${r} 分钟`}
    function label(date){if(date===dateKey())return'今天';const y=new Date();y.setDate(y.getDate()-1);if(date===dateKey(y))return'昨天';const d=new Date(date+'T12:00:00');return `${d.getMonth()+1} 月 ${d.getDate()} 日`}
    function timeValue(iso){if(!iso)return'';const d=new Date(iso);return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}
    function timeRange(date,startTime,endTime,allowOvernight=false){if(!date||!startTime||!endTime)return null;const start=new Date(`${date}T${startTime}:00`),end=new Date(`${date}T${endTime}:00`);if(allowOvernight&&end<=start)end.setDate(end.getDate()+1);if(end<=start)return null;return{startAt:start.toISOString(),endAt:end.toISOString(),duration:Math.max(1,Math.round((end-start)/60000))}}
    function defaultEntryTimes(date){const end=date===dateKey()?new Date():new Date(`${date}T10:30:00`);end.setSeconds(0,0);end.setMinutes(Math.floor(end.getMinutes()/5)*5);const start=new Date(end.getTime()-30*60000);return{start:timeValue(start.toISOString()),end:timeValue(end.toISOString())}}
    function localDate(date){return new Date(`${date}T12:00:00`)}
    function addDays(date,amount){const d=localDate(date);d.setDate(d.getDate()+amount);return dateKey(d)}
    function periodRangeFor(mode,anchor){const d=localDate(anchor);if(mode==='week'){const offset=(d.getDay()+6)%7;d.setDate(d.getDate()-offset);const start=dateKey(d);return{start,end:addDays(start,6)}}d.setDate(1);const start=dateKey(d);d.setMonth(d.getMonth()+1,0);return{start,end:dateKey(d)}}
    function periodTitle(mode,range){const start=localDate(range.start),end=localDate(range.end);if(mode==='month')return `${start.getFullYear()} 年 ${start.getMonth()+1} 月`;return start.getMonth()===end.getMonth()?`${start.getMonth()+1} 月 ${start.getDate()}–${end.getDate()} 日`:`${start.getMonth()+1} 月 ${start.getDate()} 日–${end.getMonth()+1} 月 ${end.getDate()} 日`}
    function periodTotals(mode,anchor){const range=periodRangeFor(mode,anchor),dates=Object.keys(data.days).filter(date=>date>=range.start&&date<=range.end&&day(date)&&(day(date).workStart||(day(date).manualEntries||[]).length||day(date).overrides));let work=0,commute=0,breakTime=0;dates.forEach(date=>{const d=day(date),s=summary(d);work+=s.work;breakTime+=s.break;commute+=(d.manualEntries||[]).filter(e=>e.type==='commute').reduce((sum,e)=>sum+e.duration,0)});return{range,days:dates.length,work,commute,breakTime}}
    function toast(message){$('toast').textContent=message;$('toast').hidden=false;clearTimeout(toastTimer);toastTimer=setTimeout(()=>$('toast').hidden=true,2300)}
    function render(){now=new Date();const key=dateKey(now),d=day(key),running=!!(d&&d.workStart&&!d.workEnd),posture=d&&d.postureEvents.length?d.postureEvents[d.postureEvents.length-1].mode:'sit',activity=d&&d.activityEvents.length?d.activityEvents[d.activityEvents.length-1].mode:'work';
      if(d&&d.workStart){const state=running?(activity==='break'?(posture==='stand'?'站着摸鱼':'坐着摸鱼'):(posture==='stand'?'站着工作':'坐着工作')):'今日已下班';$('state').className='state';$('state').innerHTML=`<span class="dot${running?'':' stopped'}"></span>${state}`;$('timer').classList.remove('idle');$('timer').textContent=clock(((d.workEnd?new Date(d.workEnd):now)-new Date(d.workStart))/1000);$('controls').hidden=!running;$('startBtn').hidden=true;$('adjustBtn').hidden=running;$('endBtn').hidden=!running;$('postureBtn').textContent=posture==='stand'?'坐下来':'站起来';$('postureBtn').classList.toggle('active',posture==='stand');$('activityBtn').textContent=activity==='break'?'继续干活':'摸会鱼';$('activityBtn').classList.toggle('active',activity==='break')
      }else{$('state').className='state muted';$('state').textContent='今天还没开始';$('timer').classList.add('idle');$('timer').textContent='00:00:00';$('controls').hidden=true;$('startBtn').hidden=false;$('adjustBtn').hidden=true;$('endBtn').hidden=true}
      renderDrawer()
    }
    function renderDrawer(){$('periodTabs').querySelectorAll('button').forEach(b=>b.classList.toggle('active',b.dataset.view===viewMode));$('dayView').hidden=viewMode!=='day';$('periodView').hidden=viewMode==='day';if(viewMode!=='day'){const totals=periodTotals(viewMode,periodAnchor),days=Math.max(1,totals.days);$('drawerDate').textContent=viewMode==='week'?'周统计':'月统计';$('periodLabel').textContent=periodTitle(viewMode,totals.range);$('periodWork').textContent=mins(totals.work);$('periodCommute').textContent=mins(totals.commute);$('periodBreak').textContent=mins(totals.breakTime);$('periodWorkAvg').textContent=`日均 ${mins(totals.days?Math.round(totals.work/days):0)}`;$('periodCommuteAvg').textContent=`日均 ${mins(totals.days?Math.round(totals.commute/days):0)}`;$('periodBreakAvg').textContent=`日均 ${mins(totals.days?Math.round(totals.breakTime/days):0)}`;$('periodDays').textContent=`按 ${totals.days} 个记录日计算`;$('periodNext').disabled=totals.range.end>=dateKey();return}const d=day(selected),s=summary(d);$('drawerDate').textContent=label(selected);$('sumSit').textContent=mins(s.sitting);$('sumStand').textContent=mins(s.standing);$('sumWork').textContent=mins(s.work);$('sumBreak').textContent=`其中摸鱼 ${mins(s.break)}`;$('workWindow').hidden=!(d&&d.workStart);if(d&&d.workStart)$('workWindowValue').textContent=`${timeValue(d.workStart)} — ${d.workEnd?timeValue(d.workEnd):'进行中'}`;
      const entries=d?d.manualEntries:[];$('manualSection').hidden=!entries.length;$('manualRows').innerHTML=entries.map(e=>{const when=e.startAt&&e.endAt?`${timeValue(e.startAt)}–${timeValue(e.endAt)} · `:'';return`<div class="manual-row"><div><strong>${typeNames[e.type]}</strong><span>${when}${e.duration} 分钟 · 坐 ${e.sitting} / 站 ${e.standing}</span></div><button data-delete="${e.id}">删除</button></div>`}).join('');
      const dates=Object.keys(data.days).sort((a,b)=>b.localeCompare(a));$('historyRows').innerHTML=dates.length?dates.map(date=>{const item=summary(day(date));return `<button class="history-row${selected===date?' selected':''}" data-date="${date}"><span>${label(date)}</span><span>${mins(item.sitting)} 坐着</span></button>`}).join(''):'<div class="empty">记录会从这里慢慢长出来。</div>'
    }
    function openDrawer(){selected=dateKey();viewMode='day';periodAnchor=selected;$('drawer').classList.add('open');$('backdrop').classList.add('show');$('drawer').setAttribute('aria-hidden','false');renderDrawer()}
    function closeDrawer(){$('drawer').classList.remove('open');$('backdrop').classList.remove('show');$('drawer').setAttribute('aria-hidden','true')}
    $('recordsBtn').onclick=openDrawer;$('closeDrawer').onclick=closeDrawer;$('backdrop').onclick=closeDrawer;
    $('periodTabs').onclick=e=>{const b=e.target.closest('[data-view]');if(!b)return;viewMode=b.dataset.view;periodAnchor=selected;renderDrawer()};$('periodPrev').onclick=()=>{periodAnchor=viewMode==='week'?addDays(periodAnchor,-7):(()=>{const d=localDate(periodAnchor);d.setDate(1);d.setMonth(d.getMonth()-1);return dateKey(d)})();renderDrawer()};$('periodNext').onclick=()=>{if($('periodNext').disabled)return;periodAnchor=viewMode==='week'?addDays(periodAnchor,7):(()=>{const d=localDate(periodAnchor);d.setDate(1);d.setMonth(d.getMonth()+1);return dateKey(d)})();renderDrawer()};
    $('startBtn').onclick=()=>{const at=new Date().toISOString(),key=dateKey();update(key,d=>({...d,workStart:at,workEnd:null,postureEvents:[{at,mode:'sit'}],activityEvents:[{at,mode:'work'}],overrides:undefined,overridesAt:undefined,manualOverridesAt:undefined}))};
    $('postureBtn').onclick=()=>{const key=dateKey(),d=day(key),mode=d.postureEvents[d.postureEvents.length-1].mode;update(key,x=>({...x,postureEvents:[...x.postureEvents,{at:new Date().toISOString(),mode:mode==='sit'?'stand':'sit'}]}))};
    $('activityBtn').onclick=()=>{const key=dateKey(),d=day(key),mode=d.activityEvents[d.activityEvents.length-1].mode;update(key,x=>({...x,activityEvents:[...x.activityEvents,{at:new Date().toISOString(),mode:mode==='work'?'break':'work'}]}))};
    $('endBtn').onclick=()=>{if(confirm('今天就到这里？计时会停下来。')){const key=dateKey();update(key,d=>({...d,workEnd:new Date().toISOString()}));toast('下班啦')}};
    $('historyRows').onclick=e=>{const b=e.target.closest('[data-date]');if(b){selected=b.dataset.date;renderDrawer()}};
    $('manualRows').onclick=e=>{const b=e.target.closest('[data-delete]');if(b)update(selected,d=>({...d,manualEntries:d.manualEntries.filter(x=>x.id!==b.dataset.delete)}))};
    function currentEntryDuration(){if($('entryType').value==='commute')return Math.max(0,Number($('entryDuration').value)||0);const range=timeRange($('entryDate').value,$('entryStartTime').value,$('entryEndTime').value);return range?range.duration:0}
    function syncEntryDuration(reset=false){const duration=currentEntryDuration(),old=Number($('entryCalculated').dataset.duration)||30,standing=Math.max(0,Number($('entryStanding').value)||0),wasBalanced=Number($('entrySitting').value)+standing===old;if(reset||wasBalanced)$('entrySitting').value=Math.max(0,duration-standing);$('entryCalculated').dataset.duration=String(duration);$('entryCalculated').textContent=duration?`自动算成 ${duration} 分钟`:'结束时间要晚于开始时间'}
    function syncEntryMode(reset=false){const commute=$('entryType').value==='commute';$('entryTimeRange').hidden=commute;$('entryCalculated').hidden=commute;$('entryDurationField').hidden=!commute;syncEntryDuration(reset)}
    function showEntry(){const times=defaultEntryTimes(selected);$('entryDate').value=selected;$('entryType').value='meeting';$('entryStartTime').value=times.start;$('entryEndTime').value=times.end;$('entryDuration').value=30;$('entrySitting').value=30;$('entryStanding').value=0;$('entryCalculated').dataset.duration='30';$('entryWork').checked=true;$('entryNote').value='';syncEntryMode(true);$('entryDialog').showModal()}
    $('addEntry').onclick=showEntry;$('entryType').onchange=()=>{$('entryWork').checked=true;syncEntryMode(true)};$('entryDate').onchange=()=>{const times=defaultEntryTimes($('entryDate').value);$('entryStartTime').value=times.start;$('entryEndTime').value=times.end;syncEntryDuration(true)};$('entryStartTime').oninput=()=>syncEntryDuration();$('entryEndTime').oninput=()=>syncEntryDuration();$('entryDuration').oninput=()=>syncEntryDuration();$('entryStanding').oninput=()=>{const duration=currentEntryDuration(),standing=Math.max(0,Number($('entryStanding').value)||0);if(standing<=duration)$('entrySitting').value=duration-standing};
    $('saveEntry').onclick=()=>{const date=$('entryDate').value,type=$('entryType').value,range=type==='commute'?null:timeRange(date,$('entryStartTime').value,$('entryEndTime').value),duration=type==='commute'?Math.max(0,Number($('entryDuration').value)||0):(range?range.duration:0),sitting=Math.max(0,Number($('entrySitting').value)||0),standing=Math.max(0,Number($('entryStanding').value)||0);if(!duration){toast('请把开始和结束时间填好');return}if(sitting+standing!==duration){toast('坐着 + 站着要刚好等于总时长');return}const entry={id:crypto.randomUUID(),createdAt:new Date().toISOString(),type,duration,sitting,standing,includeInWork:$('entryWork').checked,note:$('entryNote').value.trim(),startAt:range?range.startAt:undefined,endAt:range?range.endAt:undefined};update(date,d=>({...d,manualEntries:[...d.manualEntries,entry]}));selected=date;$('entryDialog').close();toast('记录加上了')};
    function syncWorkDuration(){const d=day(selected),start=$('workStartTime').value,end=$('workEndTime').value,range=end?timeRange(selected,start,end,true):null,running=selected===dateKey()&&d&&d.workStart&&!d.workEnd,startAt=start?new Date(`${selected}T${start}:00`):null,duration=range?range.duration:(start&&running?Math.max(0,Math.round((now-startAt)/60000)):0),old=Number($('workCalculated').dataset.duration)||0,standing=Math.max(0,Number($('totalStanding').value)||0),wasBalanced=Number($('totalSitting').value)+standing===old;if(duration&&wasBalanced)$('totalSitting').value=Math.max(0,duration-standing);$('workCalculated').dataset.duration=String(duration);if(range)$('workCalculated').textContent=`这一天上班 ${mins(duration)}`;else if(start&&running)$('workCalculated').textContent=`正在计时 · 目前 ${mins(duration)}`;else $('workCalculated').textContent='请填上班和下班时间'}
    function showTotals(){const d=day(selected),s=summary(d);$('workStartTime').value=d&&d.workStart?timeValue(d.workStart):'09:00';$('workEndTime').value=d&&d.workEnd?timeValue(d.workEnd):(d&&d.workStart?'':'18:00');$('totalSitting').value=s.sitting;$('totalStanding').value=s.standing;$('totalBreak').value=s.break;$('workCalculated').dataset.duration=String(s.work);syncWorkDuration();$('totalsDialog').showModal()}
    $('workStartTime').oninput=syncWorkDuration;$('workEndTime').oninput=syncWorkDuration;
    $('editTotals').onclick=showTotals;$('adjustBtn').onclick=()=>{selected=dateKey();showTotals()};$('saveTotals').onclick=()=>{const d=day(selected),startTime=$('workStartTime').value,endTime=$('workEndTime').value,running=selected===dateKey()&&d&&d.workStart&&!d.workEnd;if(!startTime||(!endTime&&!running)){toast('请填上班和下班时间');return}const startAt=new Date(`${selected}T${startTime}:00`),range=endTime?timeRange(selected,startTime,endTime,true):null;if(!range&&!running){toast('下班时间好像不对');return}const workEnd=range?range.endAt:null,workMinutes=range?range.duration:Math.max(0,Math.round((now-startAt)/60000)),adjustedAt=new Date().toISOString(),overrides={work:workMinutes,sitting:Math.max(0,Number($('totalSitting').value)||0),standing:Math.max(0,Number($('totalStanding').value)||0),break:Math.max(0,Number($('totalBreak').value)||0)};update(selected,x=>({...x,workStart:range?range.startAt:startAt.toISOString(),workEnd,overrides,overridesAt:workEnd||adjustedAt,manualOverridesAt:adjustedAt}));$('totalsDialog').close();toast('已经改好了')};
    document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>$(b.dataset.close).close());
    $('exportBtn').onclick=()=>{const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=`workish-backup-${dateKey()}.json`;a.click();URL.revokeObjectURL(url);toast('备份下载好了')};
    $('importBtn').onclick=()=>$('importFile').click();$('importFile').onchange=e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const parsed=JSON.parse(reader.result);if(parsed.version!==1||!parsed.days)throw 0;data=parsed;selected=dateKey();persist();render();toast('记录恢复好了')}catch(x){toast('这个备份文件好像不对')}};reader.readAsText(file);e.target.value=''};
    render();setInterval(render,1000)
  })();
