name: Publish workish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Get the site
        uses: actions/checkout@v6
      - name: Set up Pages
        uses: actions/configure-pages@v5
      - name: Upload the site
        uses: actions/upload-pages-artifact@v4
        with:
          path: .
      - name: Publish
        id: deployment
        uses: actions/deploy-pages@v4
